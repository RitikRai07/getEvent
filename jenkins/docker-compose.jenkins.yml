# ==========================================================
# Jenkins Server + TicketCharge Hub - Docker Compose
# Yeh CI/CD server pe run hoga
# Services: jenkins | mongodb | backend | frontend
# ==========================================================

version: '3.8'

services:

  # --------------------------------------------------------
  # Jenkins (CI/CD Server)
  # --------------------------------------------------------
  jenkins:
    image: jenkins/jenkins:lts
    container_name: ticketcharge-jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8080:8080"       # Jenkins Web UI
      - "50000:50000"     # Jenkins Agent port
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock   # Docker access
      - /usr/bin/docker:/usr/bin/docker             # Docker binary
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
    networks:
      - ticketcharge-net

  # --------------------------------------------------------
  # MongoDB
  # --------------------------------------------------------
  mongodb:
    image: mongo:7.0
    container_name: ticketcharge-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: ticketcharge_hub
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - ticketcharge-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # --------------------------------------------------------
  # Backend - Node.js + Express
  # --------------------------------------------------------
  backend:
    image: ticketcharge-backend:latest
    container_name: ticketcharge-backend
    restart: unless-stopped
    environment:
      PORT: 5050
      NODE_ENV: production
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-admin123}@mongodb:27017/ticketcharge_hub?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: http://localhost
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
    ports:
      - "5050:5050"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/public/uploads
    networks:
      - ticketcharge-net

  # --------------------------------------------------------
  # Frontend - React + Nginx
  # --------------------------------------------------------
  frontend:
    image: ticketcharge-frontend:latest
    container_name: ticketcharge-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ticketcharge-net

# --------------------------------------------------------
# Volumes
# --------------------------------------------------------
volumes:
  jenkins_home:
    driver: local
  mongodb_data:
    driver: local
  backend_uploads:
    driver: local

# --------------------------------------------------------
# Network
# --------------------------------------------------------
networks:
  ticketcharge-net:
    driver: bridge
