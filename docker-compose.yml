# ==========================================================
# TicketCharge Hub - Docker Compose
# Services: mongodb | backend | frontend
# ==========================================================

services:

  # --------------------------------------------------------
  # 1. MongoDB Database
  # --------------------------------------------------------
  mongodb:
    image: mongo:7.0
    container_name: ticketcharge-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: ticketcharge_hub
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - ticketcharge-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # --------------------------------------------------------
  # 2. Backend - Node.js + Express
  # --------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: ticketcharge-backend
    restart: unless-stopped
    environment:
      PORT: 5050
      NODE_ENV: production
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-admin123}@mongodb:27017/ticketcharge_hub?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: 7d
      FRONTEND_URL: http://localhost
      # Firebase
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      # Cloudinary
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      # Email
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      BREVO_API_KEY: ${BREVO_API_KEY}
      # Razorpay
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
    ports:
      - "5050:5050"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/public/uploads
    networks:
      - ticketcharge-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5050/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # --------------------------------------------------------
  # 3. Frontend - React + Nginx
  # --------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: ticketcharge-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ticketcharge-net

# --------------------------------------------------------
# Volumes
# --------------------------------------------------------
volumes:
  mongodb_data:
    driver: local
  backend_uploads:
    driver: local

# --------------------------------------------------------
# Network
# --------------------------------------------------------
networks:
  ticketcharge-net:
    driver: bridge
